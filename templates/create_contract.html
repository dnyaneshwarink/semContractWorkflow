<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Contract — ContractFlow</title>
    <!--link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"-->
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --ink: #0a0a0f;
            --surface: #13131a;
            --surface-2: #1a1a24;
            --surface-3: #22222f;
            --paper: #f7f5f0;
            --accent: #c8a96e;
            --accent-dim: rgba(200,169,110,0.15);
            --muted: #5a5a6e;
            --muted-light: #8888a0;
            --border: rgba(255,255,255,0.06);
            --success: #3ecf8e;
            --warning: #f5a623;
            --danger: #f56342;
            --info: #6c7ee1;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--ink);
            color: var(--paper);
            min-height: 100vh;
        }

        .navbar {
            position: sticky;
            top: 0;
            z-index: 50;
            background: rgba(10,10,15,0.9);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 14px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .nav-left { display: flex; align-items: center; gap: 16px; }

        .logo { display: flex; align-items: center; gap: 8px; text-decoration: none; }
        .logo-mark { width: 30px; height: 30px; background: var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; transform: rotate(-6deg); }
        .logo-mark svg { width: 14px; height: 14px; fill: var(--ink); }
        .logo-text { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 0.95rem; color: var(--paper); }

        .breadcrumb { display: flex; align-items: center; gap: 6px; font-size: 0.8rem; color: var(--muted-light); }
        .breadcrumb a { color: var(--muted-light); text-decoration: none; }
        .breadcrumb a:hover { color: var(--paper); }
        .breadcrumb .sep { opacity: 0.4; }
        .breadcrumb .current { color: var(--paper); font-weight: 500; }

        .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 0.82rem; font-weight: 500; text-decoration: none; border: none; cursor: pointer; transition: all 0.15s; }
        .btn-ghost { background: var(--surface-2); color: var(--muted-light); border: 1px solid var(--border); }
        .btn-ghost:hover { background: var(--surface-3); color: var(--paper); }

        /* PAGE LAYOUT */
        .page { padding: 40px 32px; max-width: 760px; margin: 0 auto; }

        .page-header { margin-bottom: 36px; }
        .page-title { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.6rem; letter-spacing: -0.03em; }
        .page-subtitle { font-size: 0.82rem; color: var(--muted-light); margin-top: 4px; }

        /* FORM CARD */
        .form-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 36px;
        }

        .form-section {
            margin-bottom: 32px;
            padding-bottom: 32px;
            border-bottom: 1px solid var(--border);
        }

        .form-section:last-of-type { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }

        .section-label {
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 0.78rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--muted-light);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-label::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .field-row.single { grid-template-columns: 1fr; }

        .field { margin-bottom: 20px; }
        .field:last-child { margin-bottom: 0; }

        label {
            display: block;
            font-size: 0.75rem;
            font-weight: 500;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--muted-light);
            margin-bottom: 8px;
        }

        .label-required::after { content: ' *'; color: var(--danger); }

        input[type="text"],
        input[type="date"],
        textarea,
        select {
            width: 100%;
            padding: 12px 14px;
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--paper);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.2s, background 0.2s;
        }

        input:focus, textarea:focus, select:focus {
            border-color: var(--accent);
            background: rgba(200,169,110,0.04);
        }

        input::placeholder, textarea::placeholder { color: var(--muted); }
        select option { background: var(--surface-3); }

        textarea { resize: vertical; min-height: 100px; }

        /* FILE UPLOAD */
        .file-drop {
            border: 2px dashed var(--border);
            border-radius: 12px;
            padding: 32px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }

        .file-drop:hover, .file-drop.drag-over {
            border-color: var(--accent);
            background: var(--accent-dim);
        }

        .file-drop input[type="file"] {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
            width: 100%;
            height: 100%;
            padding: 0;
            border: none;
        }

        .file-icon { font-size: 2rem; margin-bottom: 10px; }
        .file-text { font-size: 0.875rem; color: var(--muted-light); }
        .file-text strong { color: var(--accent); }
        .file-hint { font-size: 0.75rem; color: var(--muted); margin-top: 6px; }

        #file-name-display {
            margin-top: 12px;
            padding: 8px 14px;
            background: rgba(62,207,142,0.1);
            border: 1px solid rgba(62,207,142,0.2);
            border-radius: 8px;
            font-size: 0.8rem;
            color: var(--success);
            display: none;
        }

        /* ACTIONS */
        .form-actions {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            margin-top: 32px;
            padding-top: 28px;
            border-top: 1px solid var(--border);
        }

        .btn-draft {
            padding: 12px 24px;
            background: var(--surface-2);
            color: var(--muted-light);
            border: 1px solid var(--border);
            border-radius: 10px;
            font-family: 'Syne', sans-serif;
            font-weight: 600;
            font-size: 0.875rem;
            cursor: pointer;
            transition: all 0.15s;
        }

        .btn-draft:hover { background: var(--surface-3); color: var(--paper); }

        .btn-submit {
            padding: 12px 28px;
            background: var(--accent);
            color: var(--ink);
            border: none;
            border-radius: 10px;
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 0.875rem;
            letter-spacing: 0.02em;
            cursor: pointer;
            transition: all 0.15s;
        }

        .btn-submit:hover {
            background: #d9ba7f;
            box-shadow: 0 6px 20px rgba(200,169,110,0.25);
            transform: translateY(-1px);
        }

        /* Animate in */
        .form-card { animation: fadeUp 0.4s cubic-bezier(0.16,1,0.3,1) both; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="nav-left">
        <a href="/dashboard" class="logo">
            <div class="logo-mark">
                <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8l-6-6zm-1 1.5L18.5 9H13V3.5z"/></svg>
            </div>
            <span class="logo-text">ContractFlow</span>
        </a>
        <div class="breadcrumb">
            <span class="sep">/</span>
            <a href="/dashboard">Dashboard</a>
            <span class="sep">/</span>
            <span class="current">New Contract</span>
        </div>
    </div>
    <a href="/dashboard" class="btn btn-ghost">← Back</a>
</nav>

<div class="page">
    <div class="page-header">
        <h1 class="page-title">New Contract</h1>
        <p class="page-subtitle">Fill in the details below to create a new contract for approval.</p>
    </div>

    <div class="form-card">
        <form method="POST" enctype="multipart/form-data">

            <div class="form-section">
                <div class="section-label">Basic Information</div>

                <div class="field">
                    <label class="label-required">Contract Title</label>
                    <input type="text" name="title" placeholder="e.g., Vendor Agreement 2025" required>
                </div>

                <div class="field">
                    <label class="label-required">Description</label>
                    <textarea name="description" placeholder="Describe the purpose and scope of this contract…" required></textarea>
                </div>

                <div class="field-row">
                    <div class="field">
                        <label class="label-required">Department</label>
                        <select name="department" required>
                            <option value="">Select department…</option>
                            <option>IT</option>
                            <option>Finance</option>
                            <option>HR</option>
                            <option>Legal</option>
                        </select>
                    </div>

                    <div class="field">
                        <label class="label-required">Expiry Date</label>
                        <input type="date" name="expiry_date" required>
                    </div>
                </div>
            </div>

            <div class="form-section">
                <div class="section-label">Document Upload</div>

                <div class="file-drop" id="fileDrop">
                    <input type="file" name="file" accept=".pdf" required id="fileInput">
                    <div class="file-icon">📄</div>
                    <div class="file-text"><strong>Click to upload</strong> or drag &amp; drop</div>
                    <div class="file-hint">PDF files only · Max 10MB</div>
                </div>

                <div id="file-name-display"></div>
            </div>

            <div class="form-actions">
                <button type="submit" name="action" value="draft" class="btn-draft">
                    Save as Draft
                </button>
                <button type="submit" name="action" value="submit" class="btn-submit">
                    Submit for Approval →
                </button>
            </div>

        </form>
    </div>
</div>

<script>
const fileInput = document.getElementById('fileInput');
const fileDrop = document.getElementById('fileDrop');
const fileDisplay = document.getElementById('file-name-display');

fileInput.addEventListener('change', function() {
    if (this.files.length > 0) {
        fileDisplay.textContent = '✓ ' + this.files[0].name;
        fileDisplay.style.display = 'block';
    }
});

fileDrop.addEventListener('dragover', e => { e.preventDefault(); fileDrop.classList.add('drag-over'); });
fileDrop.addEventListener('dragleave', () => fileDrop.classList.remove('drag-over'));
fileDrop.addEventListener('drop', e => { e.preventDefault(); fileDrop.classList.remove('drag-over'); });
</script>
</body>
</html>
