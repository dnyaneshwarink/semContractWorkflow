<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ContractFlow — Sign In</title>
    <!--link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"-->
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --ink: #0a0a0f;
            --paper: #f7f5f0;
            --accent: #c8a96e;
            --accent-dark: #9c7d45;
            --muted: #6b6b7a;
            --border: rgba(0,0,0,0.08);
            --glass: rgba(247,245,240,0.85);
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--ink);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Animated background */
        .bg-grid {
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(200,169,110,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(200,169,110,0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: 0;
        }

        .bg-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.12;
            animation: drift 12s ease-in-out infinite alternate;
        }
        .bg-orb-1 { width: 500px; height: 500px; background: var(--accent); top: -150px; right: -100px; }
        .bg-orb-2 { width: 350px; height: 350px; background: #6c7ee1; bottom: -100px; left: -80px; animation-delay: -6s; }

        @keyframes drift {
            from { transform: translate(0,0) scale(1); }
            to   { transform: translate(20px, 30px) scale(1.05); }
        }

        .wrapper {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 440px;
            padding: 24px;
        }

        .brand {
            text-align: center;
            margin-bottom: 40px;
        }

        .brand-mark {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 52px;
            height: 52px;
            background: var(--accent);
            border-radius: 14px;
            margin-bottom: 16px;
            transform: rotate(-6deg);
        }

        .brand-mark svg { width: 26px; height: 26px; fill: var(--ink); }

        .brand h1 {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 1.75rem;
            color: var(--paper);
            letter-spacing: -0.03em;
        }

        .brand p {
            color: var(--muted);
            font-size: 0.875rem;
            margin-top: 4px;
            font-weight: 300;
        }

        .card {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 24px;
            padding: 40px;
            backdrop-filter: blur(20px);
        }

        .field-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 0.75rem;
            font-weight: 500;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 8px;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: var(--paper);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.95rem;
            transition: border-color 0.2s, background 0.2s;
            outline: none;
        }

        input:focus {
            border-color: var(--accent);
            background: rgba(200,169,110,0.06);
        }

        input::placeholder { color: rgba(247,245,240,0.25); }

        .btn-login {
            width: 100%;
            padding: 15px;
            background: var(--accent);
            color: var(--ink);
            border: none;
            border-radius: 12px;
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 0.95rem;
            letter-spacing: 0.04em;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s, background 0.15s;
            margin-top: 8px;
        }

        .btn-login:hover {
            transform: translateY(-1px);
            background: #d9ba7f;
            box-shadow: 0 8px 24px rgba(200,169,110,0.3);
        }

        .btn-login:active { transform: translateY(0); }

        .footer-note {
            text-align: center;
            margin-top: 24px;
            font-size: 0.78rem;
            color: rgba(247,245,240,0.2);
            font-weight: 300;
        }

        /* Flash messages */
        .flash {
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 0.85rem;
            margin-bottom: 20px;
        }
        .flash.error { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #fca5a5; }
        .flash.success { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3); color: #86efac; }

        /* Entry animation */
        .card { animation: slideUp 0.5s cubic-bezier(0.16,1,0.3,1) both; }
        .brand { animation: slideUp 0.5s cubic-bezier(0.16,1,0.3,1) 0.1s both; }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="bg-grid"></div>
<div class="bg-orb bg-orb-1"></div>
<div class="bg-orb bg-orb-2"></div>

<div class="wrapper">

    <div class="brand">
        <div class="brand-mark">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8l-6-6zm-1 1.5L18.5 9H13V3.5zM8 13h8v1.5H8V13zm0 3h8v1.5H8V16zm0-6h3v1.5H8V10z"/>
            </svg>
        </div>
        <h1>ContractFlow</h1>
        <p>Intelligent contract management platform</p>
    </div>

    <div class="card">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="flash {{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST">
            <div class="field-group">
                <label>Email Address</label>
                <input type="email" name="email" placeholder="you@company.com" required autocomplete="email">
            </div>

            <div class="field-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="••••••••" required autocomplete="current-password">
            </div>

            <button type="submit" class="btn-login">Sign In →</button>
        </form>
    </div>

    <p class="footer-note">ContractFlow v2.0 &nbsp;·&nbsp; Secure &amp; Encrypted</p>

</div>

</body>
</html>
